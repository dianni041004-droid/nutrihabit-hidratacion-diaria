<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - NutriHabit</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="../../manifest.json">
</head>
<body>

<div class="header">
    <h1>Historial</h1>
    <p>Consulta tus registros de hidratacion</p>
</div>

<div class="container">
    
    <!-- SKELETON LOADING -->
    <div id="skeletonLoading" style="display: block;">
        <div class="skeleton" style="height: 40px; border-radius: var(--radius-full); margin-bottom: var(--space-4);"></div>
        <div class="skeleton skeleton-card" style="height: 60px;"></div>
        <div class="skeleton skeleton-card" style="height: 60px; margin-top: var(--space-3);"></div>
        <div class="skeleton skeleton-card" style="height: 60px; margin-top: var(--space-3);"></div>
        <div class="skeleton skeleton-card" style="height: 60px; margin-top: var(--space-3);"></div>
    </div>

    <!-- CONTENIDO REAL -->
    <div id="contenidoHistorial" style="display: none;">
        
        <!-- Filtros -->
        <div class="filtros">
            <button class="filtro-btn active" id="filtroTodas">Todas</button>
            <button class="filtro-btn" id="filtroHoy">Hoy</button>
        </div>
        
        <!-- Estadísticas -->
        <div id="estadisticasHistorial" style="display: none; background: var(--gray-50); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); margin-bottom: var(--space-4);">
            <p style="font-size: var(--text-sm); color: var(--text-secondary); margin: 0;" id="estadisticasTexto"></p>
        </div>
        
        <!-- Lista de registros -->
        <div id="historialContainer">
            <div class="card text-center" style="border: none; box-shadow: none;">Cargando historial...</div>
        </div>
    </div>
</div>

<!-- NAVEGACIÓN INFERIOR -->

        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </svg>
        <span class="nav-label">Inicio</span>
    </a>
    <a href="historial.html" class="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 3"/>
        </svg>
        <span class="nav-label">Historial</span>
    </a>
    <a href="../metas/metas.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l3 3"/>
            <path d="M22 12c0 5.5-4.5 10-10 10"/>
        </svg>
        <span class="nav-label">Metas</span>
    </a>
    <a href="../recordatorios/recordatorios.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </svg>
        <span class="nav-label">Perfil</span>

<script type="importmap">
{
    "imports": {
        "firebase-app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase-auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase-firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
    }
}
</script>

<script type="module">
    import { ServicioAuth } from '../../servicios/ServicioFirebase.js';
    import { HistorialViewModel } from '../../vistaModelo/HistorialViewModel.js';
    import { ToastHelper } from '../../utilidades/ToastHelper.js';

    const viewModel = new HistorialViewModel();
    let uidActual = null;

    ServicioAuth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = '../acceso/login.html';
            return;
        }
        uidActual = user.uid;
        await cargarHistorial();
    });

    async function cargarHistorial() {
        try {
            document.getElementById('skeletonLoading').style.display = 'block';
            document.getElementById('contenidoHistorial').style.display = 'none';
            
            await viewModel.cargarHistorial(uidActual);
            
            document.getElementById('skeletonLoading').style.display = 'none';
            document.getElementById('contenidoHistorial').style.display = 'block';
            
            renderizarHistorial();
        } catch (error) {
            console.error(error);
            document.getElementById('skeletonLoading').innerHTML = `
                <div class="card" style="text-align: center; color: var(--accent-red);">
                    Error al cargar el historial: ${error.message}
                    <br><br>
                    <button onclick="location.reload()" class="btn btn-primary" style="display: inline-block; width: auto; padding: var(--space-3) var(--space-6);">Reintentar</button>
                </div>
            `;
            ToastHelper.error('Error al cargar el historial');
        }
    }

    function renderizarHistorial() {
        const container = document.getElementById('historialContainer');
        const registros = viewModel.registrosFiltrados;
        
        // Estadísticas
        const statsDiv = document.getElementById('estadisticasHistorial');
        const statsText = document.getElementById('estadisticasTexto');
        if (viewModel.hayRegistros) {
            const stats = viewModel.estadisticas;
            statsText.textContent = `📊 ${viewModel.totalFiltrados} registros · ${stats.litros} L totales · ${stats.promedio} ml promedio`;
            statsDiv.style.display = 'block';
        } else {
            statsDiv.style.display = 'none';
        }
        
        if (!viewModel.hayRegistros) {
            container.innerHTML = `
                <div class="card text-center" style="border: none; box-shadow: none; padding: var(--space-8) var(--space-4);">
                    <p style="color: var(--text-muted); font-size: var(--text-md);">No hay registros de hidratacion</p>
                    <p style="color: var(--gray-400); font-size: var(--text-sm); margin-top: var(--space-2);">Comienza a registrar tu consumo diario</p>
                    <a href="../hidratacion/registro.html" class="btn btn-primary" style="display: inline-block; width: auto; padding: var(--space-3) var(--space-6); margin-top: var(--space-4);">
                        Registrar consumo
                    </a>
                </div>
            `;
            return;
        }
        
        let html = '<div class="lista-items">';
        registros.forEach((reg, index) => {
            html += `
                <div class="item-historial card-animate" style="animation-delay: ${index * 30}ms;">
                    <div>
                        <div class="item-fecha">${reg.fecha} - ${reg.hora || '--:--'}</div>
                        <div class="item-cantidad">${reg.cantidadML} ml</div>
                        ${reg.nota ? `<div style="font-size: var(--text-sm); color: var(--text-muted); margin-top: var(--space-1);">${reg.nota}</div>` : ''}
                        ${reg.editado ? `<div style="font-size: var(--text-xs); color: var(--gray-400); margin-top: var(--space-1);">Editado</div>` : ''}
                    </div>
                    <div class="item-acciones">
                        <button class="btn-editar" data-id="${reg.id}" data-cantidad="${reg.cantidadML}">Editar</button>
                        <button class="btn-eliminar" data-id="${reg.id}">Eliminar</button>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        
        container.innerHTML = html;
        
        // Eventos
        container.querySelectorAll('.btn-editar').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                const cantidad = parseInt(this.dataset.cantidad);
                editarRegistro(id, cantidad);
            });
        });
        
        container.querySelectorAll('.btn-eliminar').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                eliminarRegistro(id);
            });
        });
    }

    async function eliminarRegistro(id) {
        if (!confirm('¿Eliminar este registro?')) return;
        
        try {
            await viewModel.eliminarRegistro(id);
            renderizarHistorial();
            ToastHelper.success('Registro eliminado correctamente');
        } catch (error) {
            ToastHelper.error('Error al eliminar: ' + error.message);
        }
    }

    async function editarRegistro(id, cantidadActual) {
        const nuevaCantidad = prompt('Editar cantidad (ml):', cantidadActual);
        if (!nuevaCantidad) return;
        
        try {
            await viewModel.editarRegistro(id, parseInt(nuevaCantidad));
            renderizarHistorial();
            ToastHelper.success('Registro editado correctamente');
        } catch (error) {
            ToastHelper.error('Error al editar: ' + error.message);
        }
    }

    // Filtros
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('filtroTodas').addEventListener('click', function() {
            viewModel.cambiarFiltro('todas');
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            renderizarHistorial();
            ToastHelper.info('Mostrando todos los registros');
        });
        
        document.getElementById('filtroHoy').addEventListener('click', function() {
            viewModel.cambiarFiltro('hoy');
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            renderizarHistorial();
            ToastHelper.info('Mostrando registros de hoy');
        });
    });
</script>

</body>
</html>
