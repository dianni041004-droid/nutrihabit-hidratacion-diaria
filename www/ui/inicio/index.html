<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriHabit - Inicio</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

<div class="header">
    <h1>NutriHabit</h1>
    <p>Seguimiento de hidratación diaria</p>
</div>

<div class="container">

    <div id="skeletonLoading" style="display: block;">
        <div class="skeleton skeleton-card" style="height: 180px; border-radius: var(--radius-xl);"></div>
        <div class="skeleton skeleton-card" style="height: 200px; border-radius: var(--radius-lg); margin-top: var(--space-4);"></div>
        <div class="skeleton skeleton-card" style="height: 220px; border-radius: var(--radius-lg); margin-top: var(--space-4);"></div>
        <div class="skeleton skeleton-button" style="height: 52px; border-radius: var(--radius-md); margin-top: var(--space-4);"></div>
    </div>

    <div id="contenidoDashboard" style="display: none;">

        <!-- Meta Diaria -->
        <div class="card-meta-enhanced card-animate">
            <div class="meta-label">Meta diaria</div>
            <div class="meta-numero" id="metaDiaria">--</div>
            <div class="meta-sub">Tu objetivo diario de hidratación</div>
        </div>

        <!-- Progreso de hoy -->
        <div class="card-glass card-animate">
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: var(--space-2);">
                <span style="font-size: var(--text-sm); color: var(--text-muted); font-weight: var(--font-medium);">Progreso de hoy</span>
                <span style="font-size: var(--text-xl); font-weight: var(--font-bold); color: var(--text-primary);" id="consumoActual">0 ml</span>
            </div>
            
            <div class="barra-contenedor">
                <div class="barra-progreso" id="progresoBarra" style="width: 0%;"></div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-2);">
                <span style="font-size: var(--text-sm); color: var(--text-muted);" id="porcentajeTexto">0% completado</span>
                <span style="font-size: var(--text-sm); font-weight: var(--font-medium); color: var(--primary-500);" id="restanteTexto">--</span>
            </div>
            
            <div style="margin-top: var(--space-3); padding: var(--space-3); background: var(--gray-50); border-radius: var(--radius-md); text-align: center;">
                <span style="font-size: var(--text-sm); color: var(--text-secondary);" id="mensajeMotivacional">Registra tu primer consumo del día</span>
            </div>
        </div>

        <!-- Resumen Semanal -->
        <div id="resumenSemanalContainer" class="semana-container card-animate" style="margin-top: var(--space-4);">
            <div class="semana-header">
                <span class="semana-titulo">Resumen Semanal</span>
                <div style="display: flex; align-items: center; gap: var(--space-3);">
                    <button id="btnSemanaAnterior" class="btn-semana-nav">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <span class="semana-fecha" id="semanaFecha">--</span>
                    <button id="btnSemanaSiguiente" class="btn-semana-nav">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="resumenSemanal">
                <div style="text-align: center; padding: var(--space-4); color: var(--text-muted);">Cargando...</div>
            </div>
        </div>

        <!-- Botón Registrar -->
        <a href="/ui/hidratacion/registro.html" class="btn-registrar" style="margin-top: var(--space-4);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14"/>
            </svg>
            Registrar consumo
        </a>
    </div>
</div>

<!-- NAVEGACIÓN INFERIOR -->
<div class="bottom-nav">
    <a href="/ui/inicio/index.html" class="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12l9-9 9 9"/>
            <path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/>
        </svg>
        <span class="nav-label">Inicio</span>
    </a>
    <a href="/ui/historial/historial.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 3"/>
        </svg>
        <span class="nav-label">Historial</span>
    </a>
    <a href="/ui/metas/metas.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l3 3"/>
            <path d="M22 12c0 5.5-4.5 10-10 10"/>
        </svg>
        <span class="nav-label">Metas</span>
    </a>
    <a href="/ui/recordatorios/recordatorios.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l2 2"/>
            <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
        <span class="nav-label">Recordatorios</span>
    </a>
    <a href="/ui/profile/perfil.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M5 20v-1a7 7 0 0114 0v1"/>
        </svg>
        <span class="nav-label">Perfil</span>
    </a>
</div>

<script type="importmap">
{
    "imports": {
        "firebase-app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase-auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase-firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
    }
}
</script>

<script type="module">
    import { ServicioAuth } from '/servicios/ServicioFirebase.js';
    import { RepositorioUsuarios } from '/repositorios/RepositorioUsuarios.js';
    import { RepositorioAgua } from '/repositorios/RepositorioAgua.js';
    import { InicioViewModel } from '/vistaModelo/InicioViewModel.js';
    import { parsearFechaLocal } from '/utilidades/Helpers.js';

    const viewModel = new InicioViewModel();
    let semanaOffset = 0;
    let uidActual = null;

    // ============================================
    // AUTENTICACIÓN
    // ============================================
    ServicioAuth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = '/ui/acceso/login.html';
            return;
        }
        uidActual = user.uid;

        try {
            await viewModel.cargarDatos(user.uid);
            
            document.getElementById('skeletonLoading').style.display = 'none';
            document.getElementById('contenidoDashboard').style.display = 'block';
            
            actualizarUI();
            await cargarResumenSemanal();
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('skeletonLoading').innerHTML = `
                <div class="card" style="text-align: center; color: var(--accent-red);">
                    Error al cargar los datos: ${error.message}
                    <br><br>
                    <button onclick="location.reload()" class="btn btn-primary" style="display: inline-block; width: auto; padding: var(--space-3) var(--space-6);">Reintentar</button>
                </div>
            `;
        }
    });

    // ============================================
    // ACTUALIZAR UI PRINCIPAL
    // ============================================
    function actualizarUI() {
        const data = viewModel._obtenerDatosDashboard();
        
        document.getElementById('metaDiaria').textContent = data.metaDiaria + ' ml';
        document.getElementById('consumoActual').textContent = data.consumoHoy + ' ml';
        document.getElementById('progresoBarra').style.width = data.porcentaje + '%';
        document.getElementById('porcentajeTexto').textContent = viewModel.textoProgreso;
        document.getElementById('restanteTexto').textContent = viewModel.textoRestante;
        document.getElementById('mensajeMotivacional').textContent = viewModel.mensajeMotivacional;
    }

    // ============================================
    // RESUMEN SEMANAL - VERSIÓN CORREGIDA
    // ============================================
    async function cargarResumenSemanal() {
        try {
            const uid = uidActual;
            if (!uid) {
                console.warn('No hay uid para cargar resumen semanal');
                return;
            }

            // Obtener fecha actual (hora local)
            const hoy = new Date();
            const diaSemana = hoy.getDay(); // 0 = Domingo, 1 = Lunes, ...
            
            // Calcular inicio de semana (Domingo) con offset
            const inicioSemana = new Date(hoy);
            inicioSemana.setDate(hoy.getDate() - diaSemana + (semanaOffset * 7));
            inicioSemana.setHours(0, 0, 0, 0);
            
            const finSemana = new Date(inicioSemana);
            finSemana.setDate(inicioSemana.getDate() + 6);
            finSemana.setHours(23, 59, 59, 999);
            
            // Mostrar rango de fechas
            const fechaTexto = `${inicioSemana.getDate()} ${inicioSemana.toLocaleString('es', { month: 'short' })} - ${finSemana.getDate()} ${finSemana.toLocaleString('es', { month: 'short' })}`;
            document.getElementById('semanaFecha').textContent = fechaTexto;
            
            // Obtener todos los registros del usuario
            const registros = await RepositorioAgua.obtenerTodos(uid);
            
            // Filtrar registros de la semana (usando fechas locales)
            const registrosSemana = registros.filter(reg => {
                if (!reg.fecha) return false;
                const fechaReg = parsearFechaLocal(reg.fecha);
                return fechaReg >= inicioSemana && fechaReg <= finSemana;
            });
            
            // Obtener la meta diaria del usuario
            const usuario = await RepositorioUsuarios.obtener(uid);
            const metaDiaria = usuario?.metaDiaria || 2500;
            
            // Días de la semana (empieza en Domingo)
            const diasSemana = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            
            // Inicializar consumo por día (0 = Domingo, 6 = Sábado)
            const consumoPorDia = [0, 0, 0, 0, 0, 0, 0];
            
            // Agrupar consumo por día (usando fecha LOCAL)
            registrosSemana.forEach(reg => {
                const fecha = parsearFechaLocal(reg.fecha);
                const indice = fecha.getDay(); // 0 = Domingo
                consumoPorDia[indice] += reg.cantidadML || 0;
            });
            
            console.log('📊 Consumo por día (corregido):', consumoPorDia.map((v, i) => `${diasSemana[i]}: ${v}ml`));
            
            // Construir HTML
            let html = '<div class="semana-grid">';
            let totalSemana = 0;
            let diasCompletados = 0;
            const hoyActual = new Date();
            const hoyLocal = parsearFechaLocal(`${hoyActual.getFullYear()}-${String(hoyActual.getMonth() + 1).padStart(2, '0')}-${String(hoyActual.getDate()).padStart(2, '0')}`);
            
            for (let i = 0; i < 7; i++) {
                const consumo = consumoPorDia[i] || 0;
                const porcentaje = Math.min((consumo / metaDiaria) * 100, 100);
                totalSemana += consumo;
                
                if (consumo >= metaDiaria) diasCompletados++;
                
                // Determinar clase de la barra según porcentaje
                let claseBarra = 'sin-datos';
                if (consumo > 0 && porcentaje < 50) claseBarra = 'bajo';
                else if (porcentaje >= 50 && porcentaje < 80) claseBarra = 'medio';
                else if (porcentaje >= 80 && porcentaje < 100) claseBarra = 'alto';
                else if (porcentaje >= 100) claseBarra = 'completado';
                
                // Calcular altura (mínimo 3px para que se vea)
                const altura = Math.max(porcentaje, 3);
                
                // Verificar si es hoy (usando fechas locales)
                const fechaDia = new Date(inicioSemana);
                fechaDia.setDate(inicioSemana.getDate() + i);
                const esHoy = fechaDia.getFullYear() === hoyLocal.getFullYear() &&
                              fechaDia.getMonth() === hoyLocal.getMonth() &&
                              fechaDia.getDate() === hoyLocal.getDate();
                
                // Mostrar litros
                const litrosMostrar = consumo >= 1000 ? (consumo / 1000).toFixed(1) + 'L' : consumo + 'ml';
                
                // Nombre del día
                const nombreDia = esHoy ? diasSemana[i] + ' ★' : diasSemana[i];
                const estiloNombre = esHoy ? 'color: var(--primary-500); font-weight: bold;' : '';
                
                html += `
                    <div class="semana-dia ${esHoy ? 'dia-hoy' : ''}">
                        <span class="dia-nombre" style="${estiloNombre}">${nombreDia}</span>
                        <div class="dia-barra-wrapper">
                            <div class="dia-barra ${claseBarra}" style="height: ${altura}%;"></div>
                        </div>
                        <span class="dia-valor">${litrosMostrar}</span>
                    </div>
                `;
            }
            
            html += '</div>';
            
            // Estadísticas
            const promedioDiario = Math.round(totalSemana / 7);
            html += `
                <div class="semana-estadisticas">
                    <div class="stat">
                        <span class="stat-valor">${(totalSemana / 1000).toFixed(1)}L</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat">
                        <span class="stat-valor">${(promedioDiario / 1000).toFixed(1)}L</span>
                        <span class="stat-label">Promedio</span>
                    </div>
                    <div class="stat">
                        <span class="stat-valor">${diasCompletados}/7</span>
                        <span class="stat-label">Metas</span>
                    </div>
                </div>
            `;
            
            document.getElementById('resumenSemanal').innerHTML = html;
            
        } catch (error) {
            console.error('Error en resumen semanal:', error);
            document.getElementById('resumenSemanal').innerHTML = `
                <div style="text-align: center; padding: var(--space-4); color: var(--accent-red);">
                    Error: ${error.message}
                </div>
            `;
        }
    }

    // ============================================
    // EVENTOS
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
        // Navegación semanal
        document.getElementById('btnSemanaAnterior').addEventListener('click', () => {
            semanaOffset--;
            cargarResumenSemanal();
        });
        
        document.getElementById('btnSemanaSiguiente').addEventListener('click', () => {
            semanaOffset++;
            cargarResumenSemanal();
        });
    });

    // Actualizar al volver a la pestaña
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && uidActual) {
            viewModel.refrescar().then(() => {
                actualizarUI();
                cargarResumenSemanal();
            });
        }
    });

</script>

</body>
</html>
