<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriHabit - Iniciar Sesion</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="../../manifest.json">
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1>Iniciar sesion</h1>
        <p>Ingresa tus credenciales para continuar</p>
    </div>

    <div class="auth-form">
        <div id="errorContainer" style="display: none; background: #FDF2EF; color: #D4846C; padding: 12px; border-radius: 12px; margin-bottom: 16px; font-size: 14px;"></div>
        
        <label>Correo electronico</label>
        <input type="email" id="emailInput" placeholder="tu@email.com" autocomplete="email">
        
        <label>Contraseña</label>
        <input type="password" id="passwordInput" placeholder="Tu contraseña" autocomplete="current-password">
        
        <button class="btn-principal" id="btnIniciarSesion">
            <span id="btnTexto">Iniciar sesion</span>
            <span id="btnSpinner" style="display: none;">Cargando...</span>
        </button>
        
        <div class="auth-link">
            <p>¿No tienes cuenta? <a href="register.html">Registrate aqui</a></p>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase-app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase-auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase-firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
    }
}
</script>

<script type="module">
    import { LoginViewModel } from '../../vistaModelo/LoginViewModel.js';

    // Instanciar ViewModel
    const viewModel = new LoginViewModel();

    // ============================================
    // ELEMENTOS DOM
    // ============================================
    
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const btnIniciar = document.getElementById('btnIniciarSesion');
    const btnTexto = document.getElementById('btnTexto');
    const btnSpinner = document.getElementById('btnSpinner');
    const errorContainer = document.getElementById('errorContainer');

    // ============================================
    // FUNCIÓN DE INICIO DE SESIÓN
    // ============================================
    
    async function iniciarSesion() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Mostrar estado de carga
        btnTexto.style.display = 'none';
        btnSpinner.style.display = 'inline';
        btnIniciar.disabled = true;
        errorContainer.style.display = 'none';

        try {
            await viewModel.iniciarSesion(email, password);
            alert('Sesion iniciada correctamente');
            window.location.href = '../inicio/index.html';
        } catch (error) {
            // Mostrar error
            errorContainer.textContent = viewModel.error || 'Error al iniciar sesion';
            errorContainer.style.display = 'block';
        } finally {
            btnTexto.style.display = 'inline';
            btnSpinner.style.display = 'none';
            btnIniciar.disabled = false;
        }
    }

    // ============================================
    // EVENTOS
    // ============================================
    
    document.addEventListener('DOMContentLoaded', () => {
        btnIniciar.addEventListener('click', iniciarSesion);
        
        // Permitir enviar con Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active === emailInput || active === passwordInput) {
                    iniciarSesion();
                }
            }
        });

        // Limpiar error al escribir
        emailInput.addEventListener('input', () => {
            errorContainer.style.display = 'none';
        });
        passwordInput.addEventListener('input', () => {
            errorContainer.style.display = 'none';
        });
    });
</script>

<style>
    .auth-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 24px;
        background: #F5F7F0;
        max-width: 400px;
        margin: 0 auto;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 32px;
        width: 100%;
    }

    .auth-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #2C3E2F;
        margin-bottom: 8px;
    }

    .auth-header p {
        font-size: 14px;
        color: #8A9A6C;
    }

    .auth-form {
        width: 100%;
        max-width: 320px;
    }

    .auth-form label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #5A6E4A;
        margin-bottom: 6px;
    }

    .auth-form input {
        width: 100%;
        padding: 14px 16px;
        background: #FFFFFF;
        border: 1px solid #E0E8D4;
        border-radius: 12px;
        font-size: 15px;
        font-family: 'Inter', sans-serif;
        margin-bottom: 16px;
        transition: all 0.2s ease;
    }

    .auth-form input:focus {
        outline: none;
        border-color: #3A7D44;
        box-shadow: 0 0 0 3px rgba(58, 125, 68, 0.1);
    }

    .auth-form .btn-principal {
        width: 100%;
        padding: 16px;
        font-size: 16px;
        border-radius: 14px;
        background: #3A7D44;
        color: white;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 4px;
    }

    .auth-form .btn-principal:hover {
        background: #2E6B38;
        transform: translateY(-1px);
    }

    .auth-form .btn-principal:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .auth-link {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #8A9A6C;
    }

    .auth-link a {
        color: #3A7D44;
        font-weight: 600;
        text-decoration: none;
    }

    .auth-link a:hover {
        text-decoration: underline;
    }
</style>

</body>
</html>
